---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
# image will be published to ghcr.io/<user>/<name>

####################
#### Image Info ####
####################
name: koral-os-nvidia
description: KoralOS image for NVIDIA GPUS.
base-image: ghcr.io/ferret-linux/mink-os-nvidia
image-version: latest
platforms:
  - linux/amd64
#################
#### MODULES ####
#################
modules:
## Import Modules/Scripts ##
  - from-file: build/configure/pre-setup.yml

  - from-file: build/install/plasma-base.yml
  - from-file: build/install/plasma-addons.yml
  - from-file: build/install/plasma-extras.yml
  - from-file: build/install/plasma-optionals.yml
  - from-file: build/install/plasma-apps.yml
  - from-file: build/install/plasma-input.yml
  
  - from-file: build/configure/koral-settings.yml
  - from-file: build/configure/post-setup.yml
  - from-file: build/configure/os-release.yml
